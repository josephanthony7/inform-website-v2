<?xml version="1.0" encoding="UTF-8"?>
<!-- Inform Growth Color Tokens Reference -->
<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#F7F7F5"/>

  <text x="24" y="36" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#1A1A18">Inform Growth Color Tokens</text>

  <!-- Primary Colors -->
  <text x="24" y="70" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#4A4844">PRIMARY COLORS</text>

  <!-- Dark Green (Accent) -->
  <rect x="24" y="82" width="80" height="50" rx="6" fill="#2D5016"/>
  <text x="24" y="148" font-family="mono" font-size="10" fill="#1A1A18">#2D5016</text>
  <text x="24" y="160" font-family="Inter, sans-serif" font-size="9" fill="#7A7772">Dark Green</text>

  <!-- Forest Green (Accent Sections) -->
  <rect x="120" y="82" width="80" height="50" rx="6" fill="#1A2E0D"/>
  <text x="120" y="148" font-family="mono" font-size="10" fill="#1A1A18">#1A2E0D</text>
  <text x="120" y="160" font-family="Inter, sans-serif" font-size="9" fill="#7A7772">Forest Green</text>

  <!-- Lime (Accent Highlight) -->
  <rect x="216" y="82" width="80" height="50" rx="6" fill="#C8F04A"/>
  <text x="216" y="148" font-family="mono" font-size="10" fill="#1A1A18">#C8F04A</text>
  <text x="216" y="160" font-family="Inter, sans-serif" font-size="9" fill="#7A7772">Lime Accent</text>

  <!-- Background Colors -->
  <text x="24" y="200" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#4A4844">BACKGROUNDS</text>

  <!-- White -->
  <rect x="24" y="212" width="80" height="50" rx="6" fill="#FFFFFF" stroke="#E5E5E0"/>
  <text x="24" y="278" font-family="mono" font-size="10" fill="#1A1A18">#FFFFFF</text>
  <text x="24" y="290" font-family="Inter, sans-serif" font-size="9" fill="#7A7772">Base/Cards</text>

  <!-- Off White -->
  <rect x="120" y="212" width="80" height="50" rx="6" fill="#F7F7F5" stroke="#E5E5E0"/>
  <text x="120" y="278" font-family="mono" font-size="10" fill="#1A1A18">#F7F7F5</text>
  <text x="120" y="290" font-family="Inter, sans-serif" font-size="9" fill="#7A7772">Surface</text>

  <!-- Border -->
  <rect x="216" y="212" width="80" height="50" rx="6" fill="#E5E5E0"/>
  <text x="216" y="278" font-family="mono" font-size="10" fill="#1A1A18">#E5E5E0</text>
  <text x="216" y="290" font-family="Inter, sans-serif" font-size="9" fill="#7A7772">Border</text>

  <!-- Text Colors -->
  <text x="24" y="330" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#4A4844">TEXT</text>

  <!-- Primary Text -->
  <rect x="24" y="342" width="80" height="30" rx="6" fill="#1A1A18"/>
  <text x="24" y="386" font-family="mono" font-size="10" fill="#1A1A18">#1A1A18</text>

  <!-- Secondary Text -->
  <rect x="120" y="342" width="80" height="30" rx="6" fill="#4A4844"/>
  <text x="120" y="386" font-family="mono" font-size="10" fill="#1A1A18">#4A4844</text>

  <!-- Muted Text -->
  <rect x="216" y="342" width="80" height="30" rx="6" fill="#7A7772"/>
  <text x="216" y="386" font-family="mono" font-size="10" fill="#1A1A18">#7A7772</text>

  <!-- Dark Mode Section -->
  <rect x="340" y="60" width="240" height="320" rx="8" fill="#1A2E0D"/>
  <text x="360" y="90" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Dark Mode</text>

  <text x="360" y="120" font-family="Inter, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Background: #1A2E0D</text>
  <text x="360" y="140" font-family="Inter, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Text: #FFFFFF</text>
  <text x="360" y="160" font-family="Inter, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Muted: rgba(255,255,255,0.7)</text>
  <text x="360" y="180" font-family="Inter, sans-serif" font-size="10" fill="#C8F04A">Accent: #C8F04A</text>

  <!-- Sample dark mode logo -->
  <rect x="360" y="200" width="16" height="6" rx="1.5" fill="#FFFFFF" fill-opacity="0.2"/>
  <rect x="360" y="214" width="28" height="6" rx="1.5" fill="#FFFFFF" fill-opacity="0.5"/>
  <rect x="360" y="228" width="42" height="6" rx="1.5" fill="#C8F04A"/>

  <text x="360" y="270" font-family="Inter, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="2">INFORM</text>
  <text x="360" y="290" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">GROWTH</text>
</svg>

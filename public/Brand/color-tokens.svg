<?xml version="1.0" encoding="UTF-8"?>
<svg width="560" height="200" viewBox="0 0 560 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="560" height="200" fill="#0D0D0B"/>

  <!-- Swatches row 1: backgrounds -->
  <rect x="20" y="20" width="68" height="48" rx="6" fill="#0D0D0B" stroke="#2A2A26" stroke-width="0.5"/>
  <text x="54" y="82" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5C5A56" text-anchor="middle">Base</text>
  <text x="54" y="93" font-family="Courier New, monospace" font-size="8" fill="#3A3A36" text-anchor="middle">#0D0D0B</text>

  <rect x="104" y="20" width="68" height="48" rx="6" fill="#141412" stroke="#2A2A26" stroke-width="0.5"/>
  <text x="138" y="82" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5C5A56" text-anchor="middle">Surface</text>
  <text x="138" y="93" font-family="Courier New, monospace" font-size="8" fill="#3A3A36" text-anchor="middle">#141412</text>

  <rect x="188" y="20" width="68" height="48" rx="6" fill="#1C1C19" stroke="#2A2A26" stroke-width="0.5"/>
  <text x="222" y="82" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5C5A56" text-anchor="middle">Raised</text>
  <text x="222" y="93" font-family="Courier New, monospace" font-size="8" fill="#3A3A36" text-anchor="middle">#1C1C19</text>

  <rect x="272" y="20" width="68" height="48" rx="6" fill="#2A2A26" stroke="#3A3A36" stroke-width="0.5"/>
  <text x="306" y="82" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5C5A56" text-anchor="middle">Border</text>
  <text x="306" y="93" font-family="Courier New, monospace" font-size="8" fill="#3A3A36" text-anchor="middle">#2A2A26</text>

  <!-- Accent -->
  <rect x="356" y="20" width="68" height="48" rx="6" fill="#C8F04A"/>
  <text x="390" y="82" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="8" fill="#8C8880" text-anchor="middle">Accent</text>
  <text x="390" y="93" font-family="Courier New, monospace" font-size="8" fill="#5C5A56" text-anchor="middle">#C8F04A</text>

  <!-- Text colors -->
  <rect x="20" y="110" width="68" height="48" rx="6" fill="#F0EBE0"/>
  <text x="54" y="172" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5C5A56" text-anchor="middle">Text primary</text>
  <text x="54" y="183" font-family="Courier New, monospace" font-size="8" fill="#3A3A36" text-anchor="middle">#F0EBE0</text>

  <rect x="104" y="110" width="68" height="48" rx="6" fill="#8C8880"/>
  <text x="138" y="172" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5C5A56" text-anchor="middle">Text secondary</text>
  <text x="138" y="183" font-family="Courier New, monospace" font-size="8" fill="#3A3A36" text-anchor="middle">#8C8880</text>

  <rect x="188" y="110" width="68" height="48" rx="6" fill="#5C5A56"/>
  <text x="222" y="172" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5C5A56" text-anchor="middle">Text tertiary</text>
  <text x="222" y="183" font-family="Courier New, monospace" font-size="8" fill="#3A3A36" text-anchor="middle">#5C5A56</text>


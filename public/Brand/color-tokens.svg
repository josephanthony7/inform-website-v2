  <rect x="272" y="110" width="68" height="48" rx="6" fill="#4A6E00"/>
  <text x="306" y="172" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5C5A56" text-anchor="middle">Accent reversed</text>
  <text x="306" y="183" font-family="Courier New, monospace" font-size="8" fill="#3A3A36" text-anchor="middle">#4A6E00</text>

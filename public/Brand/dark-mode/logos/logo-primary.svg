<?xml version="1.0" encoding="UTF-8"?>
<!-- Inform Growth Logo - Dark Mode (for dark backgrounds) -->
<svg width="260" height="64" viewBox="0 0 260 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background for overlay use -->
  <rect width="260" height="64" fill="transparent"/>

  <!-- Brand mark - stacked bars -->
  <rect x="20" y="15.5" width="16" height="6" rx="1.5" fill="#FFFFFF" fill-opacity="0.2"/>
  <rect x="20" y="29" width="28" height="6" rx="1.5" fill="#FFFFFF" fill-opacity="0.5"/>
  <rect x="20" y="42.5" width="42" height="6" rx="1.5" fill="#C8F04A"/>

  <!-- Wordmark -->
  <text x="78" y="30" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#FFFFFF" fill-opacity="0.6" letter-spacing="3">INFORM</text>
  <text x="77" y="48.5" font-family="Inter, -apple-system, sans-serif" font-size="21" font-weight="600" fill="#FFFFFF" letter-spacing="0.5">GROWTH</text>
</svg>

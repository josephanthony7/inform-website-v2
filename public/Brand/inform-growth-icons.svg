    <rect x="16" y="6" width="5" height="16" rx="0.5" stroke="#C8F04A" stroke-width="1.5"/>
    <line x1="18.5" y1="6" x2="18.5" y2="3.5" stroke="#C8F04A" stroke-width="1.5" stroke-linecap="round"/>

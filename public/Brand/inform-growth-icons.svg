    <line x1="2" y1="12" x2="6.5" y2="12" stroke="#8C8880" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="3" y1="15" x2="7.5" y2="15" stroke="#8C8880" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8.5" y1="12" x2="18" y2="12" stroke="#C8F04A" stroke-width="1.5" stroke-linecap="round"/>

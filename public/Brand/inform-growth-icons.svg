    <circle cx="12" cy="5" r="2" stroke="#8C8880" stroke-width="1.5"/>
    <circle cx="20" cy="5" r="2" stroke="#8C8880" stroke-width="1.5"/>
    <circle cx="12" cy="20" r="2.5" stroke="#C8F04A" stroke-width="1.5"/>
    <line x1="5" y1="7" x2="10.5" y2="17.8" stroke="#8C8880" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="7" x2="12" y2="17.5" stroke="#8C8880" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="19" y1="7" x2="13.5" y2="17.8" stroke="#8C8880" stroke-width="1.5" stroke-linecap="round"/>
    <text x="12" y="38" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#5C5A56" text-anchor="middle">Attribution</text>

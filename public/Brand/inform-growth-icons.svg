  <g transform="translate(300,140)">
    <path d="M12,2 L20,6 L20,15 Q20,20 12,22 Q4,20 4,15 L4,6 Z" stroke="#8C8880" stroke-width="1.5" stroke-linejoin="round"/>
    <polyline points="8.5,12 11,14.5 16,9" stroke="#C8F04A" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="12" y="38" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#5C5A56" text-anchor="middle">Security</text>

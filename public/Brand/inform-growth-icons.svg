<?xml version="1.0" encoding="UTF-8"?>
<svg width="560" height="280" viewBox="0 0 560 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="560" height="280" fill="#0D0D0B"/>

  <!-- Row 1 -->
  <!-- 1: Deep-Scan (x=20) -->
  <g transform="translate(20,20)">
    <circle cx="10.5" cy="10.5" r="7" stroke="#8C8880" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="#8C8880" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7" y1="8.5" x2="14.5" y2="8.5" stroke="#8C8880" stroke-width="1.2" stroke-opacity="0.45" stroke-linecap="round"/>

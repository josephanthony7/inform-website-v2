<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Inform Growth">
  <title>Inform Growth</title>

  <!-- Navy background circle -->
  <circle cx="32" cy="32" r="30" fill="#0F2336"/>

  <!-- Pine tree — three tiers, white -->

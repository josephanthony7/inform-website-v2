  <polygon points="32,18 19,36 45,36" fill="#FFFFFF"/>
  <polygon points="32,28 14,50 50,50" fill="#FFFFFF"/>

  <!-- Trunk — sky-blue -->
  <rect x="29" y="50" width="6" height="8" rx="1.5" fill="#0EA5E9"/>
</svg>
